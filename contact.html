<head>
  <meta charset="utf-8">

  <meta property="og:title" content="お問い合わせ | 日本特定技能教育支援協会">
  <meta property="og:description" content="教育支援、制度構築、会員制度、海外連携及び資料請求に関するお問い合わせを受け付けています。">

  <meta name="twitter:description" content="教育支援、制度構築、会員制度、海外連携及び資料請求に関するお問い合わせを受け付けています。">
  <meta name="twitter:image" content="https://association.sgea.global/assets/og-image.jpg">
  <link rel="icon" href="assets/favicon.png" type="image/png" sizes="256x256">
  <link rel="apple-touch-icon" href="assets/favicon.png">
  <link rel="stylesheet" href="styles.css?v=15">
</head>
<body>
  <a class="skip-link" href="#main-content">本文へ移動</a>
<header class="site-header" data-header></header>
  <main id="main-content">
    <section class="page-hero">
      <div class="container">
        <nav class="breadcrumb" aria-label="パンくず"><a href="index.html">トップ</a> / お問い合わせ</nav>
        <h1>お問い合わせ</h1>
        <p>教育支援、会員制度、海外連携、資料のご請求に関するご相談を受け付けています。</p>
      </div>
    </section>
    <section class="section">
      <div class="container feature-band">
        <form class="form card" action="" method="post" data-contact-form>
          <div class="honeypot" aria-hidden="true" hidden>
            <label for="website">ウェブサイト</label>
            <input id="website" name="website" type="text" tabindex="-1" autocomplete="off">
          </div>
          <div class="form-grid">
            <div class="field">
              <label for="name">氏名</label>
              <input id="name" name="name" type="text" autocomplete="name" maxlength="100" required>
            </div>
            <div class="field">
              <label for="organization">会社名・団体名</label>
              <input id="organization" name="organization" type="text" autocomplete="organization" maxlength="150">
            </div>
            <div class="field">
              <label for="email">メールアドレス</label>
              <input id="email" name="email" type="email" autocomplete="email" inputmode="email" maxlength="254" required>
            </div>
            <div class="field">
              <label for="tel">電話番号</label>
              <input id="tel" name="tel" type="tel" autocomplete="tel" inputmode="tel" maxlength="30">
            </div>
          </div>
          <div class="field">
            <label for="type">問い合わせ種別</label>
            <select id="type" name="type" required>
              <option value="">選択してください</option>
              <option>教育支援について</option>
              <option>会員制度について</option>
              <option>海外連携について</option>
              <option>資料のご請求</option>
              <option>その他</option>
            </select>
          </div>
          <div class="field">
            <label for="message">問い合わせ内容</label>
            <textarea id="message" name="message" minlength="10" maxlength="5000" required></textarea>
          </div>
          <label class="consent">
            <input name="privacyConsent" type="checkbox" value="agreed" required>
            <span><a href="privacy.html" target="_blank" rel="noopener">個人情報保護方針</a>を確認し、入力情報の取扱いに同意します。</span>
          </label>
          <button class="button" type="submit">内容を送信する</button>
          <p class="form-status" data-form-status role="status" aria-live="polite" tabindex="-1" hidden></p>
        </form>
        <aside class="panel">
          <h2>お問い合わせ前に</h2>
          <p>当協会は登録支援機関ではなく、教育支援、制度構築及び国際連携を担う団体です。採用あっせん又は人材紹介ではなく、育成体制及び教育連携に関するご相談を中心に承ります。</p>
          <ul class="list">
            <li>会員参加・賛助に関するご相談</li>
            <li>自治体・企業との教育連携</li>
            <li>海外教育機関・財団との連携</li>
            <li>セミナー・資料のご請求</li>
          </ul>
        </aside>
      </div>
    </section>
  </main>
  <footer class="site-footer" data-footer></footer>
  <script src="site-config.js?v=6"></script>
  <script src="app.js?v=20"></script>
  <script src="contact.js?v=5"></script>
</body>
</html>
